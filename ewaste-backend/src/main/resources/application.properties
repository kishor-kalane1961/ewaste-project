# ==============================
# Server Configuration
# ==============================
server.port=8084

# ==============================
# Database Configuration
# ==============================
spring.datasource.url=jdbc:mysql://localhost:3306/ewaste_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=mysql

# ==============================
# JPA / Hibernate Configuration
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==============================
# File Upload Configuration
# ==============================
# Application base URL
file.upload-dir=C:/ewaste/uploads
app.base-url=http://localhost:8084

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ==============================
# Error Handling
# ==============================
server.error.include-message=always
server.error.include-binding-errors=always

# ==============================
# JWT Configuration
# ==============================
jwt.secret=mySuperSecretKeyForJwtValidation12345
jwt.expiration=36000000  # 10 hours in milliseconds

